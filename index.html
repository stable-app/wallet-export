<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Stable — Recovery key</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #FFFFFF; color: #14181D;
    display: flex; min-height: 100dvh; align-items: flex-start; justify-content: center;
    padding: 48px 24px 24px;
  }
  .card { width: 100%; max-width: 360px; text-align: center; }
  .brand { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #696D77; font-weight: 600; }
  h1 { font-size: 24px; letter-spacing: -0.03em; margin: 10px 0 8px; }
  p.desc { font-size: 14px; line-height: 1.5; color: #4B4F55; }
  input {
    margin-top: 20px; width: 100%; padding: 14px 16px; font-size: 16px;
    border: 1px solid rgba(20,24,29,0.14); border-radius: 14px; outline: none;
    background: #F0F1F5; color: #14181D; text-align: center;
    -webkit-appearance: none; appearance: none;
  }
  input:focus { border-color: #14181D; background: #FFFFFF; }
  input.code { letter-spacing: 0.4em; font-size: 22px; font-weight: 600; }
  button {
    margin-top: 14px; width: 100%; padding: 17px 0; border: 0; border-radius: 22px;
    background: #14181D; color: #fff; font-size: 17px; font-weight: 600;
    letter-spacing: -0.02em; cursor: pointer;
  }
  button:disabled { opacity: 0.4; }
  button.reveal { background: #1F5841; }
  .status { margin-top: 14px; font-size: 13px; color: #696D77; min-height: 18px; }
  .ok { color: #1F5841; }
  .err { color: #C24A3D; }
  .warn { font-size: 12.5px; color: #696D77; margin-top: 18px; line-height: 1.5; }
  .link { margin-top: 12px; background: none; border: none; color: #696D77; font-size: 13px; text-decoration: underline; width: auto; padding: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Stable</div>
  <h1>Recovery key</h1>
  <div id="root"><p class="desc">Loading…</p></div>
</div>
<script type="module">
  import React from "https://esm.sh/react@18.3.1";
  import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
  import { PrivyProvider, usePrivy, useLoginWithEmail } from "https://esm.sh/@privy-io/react-auth@2?deps=react@18.3.1,react-dom@18.3.1";
  import { useExportWallet } from "https://esm.sh/@privy-io/react-auth@2/solana?deps=react@18.3.1,react-dom@18.3.1";

  const h = React.createElement;

  // Headless email login — OUR fields, no Privy modal. (Privy's prebuilt
  // dialog loses its CSS through CDN bundling; the broken layout stacked the
  // submit button over the email input and swallowed every tap.)
  function App() {
    const { ready, authenticated, user, logout } = usePrivy();
    const { sendCode, loginWithCode } = useLoginWithEmail();
    const { exportWallet } = useExportWallet();

    const [stage, setStage] = React.useState("email"); // email | code
    const [email, setEmail] = React.useState("");
    const [code, setCode] = React.useState("");
    const [busy, setBusy] = React.useState(false);
    const [status, setStatus] = React.useState(["", ""]); // [text, class]

    if (!ready) return h("p", { className: "desc" }, "Loading…");

    if (authenticated) {
      const addr = user?.email?.address ?? email;
      return h(React.Fragment, null,
        h("p", { className: "desc" },
          (addr ? `Signed in as ${addr}. ` : "") +
          "Your key reveals in Privy's secure window — Stable never sees it."),
        h("button", {
          className: "reveal",
          disabled: busy,
          onClick: async () => {
            setBusy(true); setStatus(["", ""]);
            try {
              await exportWallet();
              setStatus(["Done — you can close this page.", "ok"]);
            } catch (e) {
              setStatus(["Couldn't reveal: " + String(e?.message ?? e).slice(0, 140), "err"]);
            } finally { setBusy(false); }
          },
        }, busy ? "Opening…" : "Reveal my key"),
        h("div", { className: "status " + status[1] }, status[0]),
        h("button", {
          className: "link",
          onClick: () => logout().then(() => { setStage("email"); setCode(""); setStatus(["", ""]); }),
        }, "Sign out"),
        h("p", { className: "warn" },
          "Never share your recovery key. Anyone who has it can spend your money. Stable will never ask for it.")
      );
    }

    if (stage === "code") {
      return h(React.Fragment, null,
        h("p", { className: "desc" }, `We sent a 6-digit code to ${email}. Check spam too.`),
        h("input", {
          className: "code", inputMode: "numeric", autoComplete: "one-time-code",
          maxLength: 6, placeholder: "······", value: code, autoFocus: true,
          onChange: (e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 6)),
        }),
        h("button", {
          disabled: busy || code.length !== 6,
          onClick: async () => {
            setBusy(true); setStatus(["", ""]);
            try {
              await loginWithCode({ code, email });
              // authenticated flips via usePrivy on success.
            } catch (e) {
              setStatus(["That code didn't match. Try again or resend.", "err"]);
              setCode("");
            } finally { setBusy(false); }
          },
        }, busy ? "Checking…" : "Verify"),
        h("div", { className: "status " + status[1] }, status[0]),
        h("button", {
          className: "link",
          onClick: () => { setStatus(["Sent — check your inbox.", "ok"]); sendCode({ email }).catch(() => {}); },
        }, "Resend code"),
        h("button", {
          className: "link",
          onClick: () => { setStage("email"); setCode(""); setStatus(["", ""]); },
        }, "Different email")
      );
    }

    return h(React.Fragment, null,
      h("p", { className: "desc" },
        "Sign in with the same email you use in Stable, then reveal your wallet's private key. It appears in Privy's secure window — Stable never sees it."),
      h("input", {
        type: "email", inputMode: "email", autoComplete: "email",
        placeholder: "you@example.com", value: email, autoCapitalize: "none",
        onChange: (e) => setEmail(e.target.value.trim()),
      }),
      h("button", {
        disabled: busy || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email),
        onClick: async () => {
          setBusy(true); setStatus(["", ""]);
          try {
            await sendCode({ email });
            setStage("code");
          } catch (e) {
            setStatus(["Couldn't send the code: " + String(e?.message ?? e).slice(0, 120), "err"]);
          } finally { setBusy(false); }
        },
      }, busy ? "Sending…" : "Send code"),
      h("div", { className: "status " + status[1] }, status[0]),
      h("p", { className: "warn" },
        "Never share your recovery key. Anyone who has it can spend your money. Stable will never ask for it.")
    );
  }

  createRoot(document.getElementById("root")).render(
    h(PrivyProvider, { appId: "cmrmljdzy000l0cjvz7n3uyhc", config: { appearance: { theme: "light", accentColor: "#1F5841" } } }, h(App))
  );
</script>
</body>
</html>
